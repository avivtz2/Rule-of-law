                          <h3 className="text-2xl font-bold text-slate-800 mb-6 border-b-2 border-slate-200 pb-2">פירוט החלטות וניתוח רטרוספקטיבי:</h3>
                          <div className="space-y-6 mb-12">
                            {history.map((h, i) => (
                              <div key={i} className="bg-white p-6 rounded-lg border border-slate-200 shadow-sm relative overflow-hidden">
                                <div className={`absolute top-0 right-0 w-1.5 h-full ${h.feedback.success ? 'bg-emerald-500' : 'bg-rose-500'}`}></div>
                                <div className="flex items-center gap-3 mb-3">
                                  <div className="w-8 h-8 bg-slate-100 text-slate-700 rounded-full flex items-center justify-center font-bold border border-slate-300">{i+1}</div>
                                  <h4 className="text-xl font-bold text-slate-800">{SCENARIOS[h.node].title}</h4>
                                </div>
                                <p className="text-lg text-slate-800 mb-4 pr-11"><span className="font-bold">החלטה שהתקבלה:</span> {h.text}</p>
                                <div className="bg-slate-50 p-4 rounded text-slate-700 border border-slate-100 mr-11">
                                  <span className="font-bold block mb-1">ניתוח אזרחי:</span>
                                  {typeof h.feedback.analysis === 'function' ? h.feedback.analysis(g) : h.feedback.analysis}
                                </div>
                              </div>
                            ))}
                          </div>

                          <h3 className="text-2xl font-bold text-slate-800 mb-6 border-b-2 border-slate-200 pb-2">מסקנות ותוצאה סופית:</h3>
                          <div className={`p-6 rounded-lg border-2 ${end.border} ${end.bg}`}>
                            <h4 className={`text-2xl font-black ${end.color} mb-4 flex items-center gap-2`}>
                              <end.icon className="w-6 h-6" />
                              {end.title}
                            </h4>
                            <p className="text-lg text-slate-800 mb-4 leading-relaxed"><span className="font-bold block mb-1">השתלשלות האירועים:</span> {typeof end.story === 'function' ? end.story(g) : end.story}</p>
                            <div className="bg-white/50 p-4 rounded border border-white/50">
                              <p className="text-lg text-slate-800 leading-relaxed"><span className="font-bold block mb-1">שורה תחתונה:</span> {typeof end.analysis === 'function' ? end.analysis(g) : end.analysis}</p>
                            </div>
                          </div>
                          
                          <h3 className="text-2xl font-bold text-slate-800 mt-12 mb-6 border-b-2 border-slate-200 pb-2">תחקיר אישי:</h3>
                          <div className="space-y-6 mb-12">
                            <div className="bg-slate-50 p-6 rounded-lg border border-slate-200">
                              <p className="font-bold text-slate-800 mb-2">1. {g('הצג', 'הציגי')} שלושה דברים שהתחדשו לך במהלך הפעילות.</p>
                              <p className="text-slate-700 whitespace-pre-wrap leading-relaxed">{questionnaireAnswers.q1}</p>
                            </div>
                            <div className="bg-slate-50 p-6 rounded-lg border border-slate-200">
                              <p className="font-bold text-slate-800 mb-2">2. {g('בחר', 'בחרי')} את אחת ההחלטות שלך לאורך הפעילות {g('ונמק', 'ונמקי')} אותה.</p>
                              <p className="text-slate-700 whitespace-pre-wrap leading-relaxed">{questionnaireAnswers.q2}</p>
                            </div>
                            <div className="bg-slate-50 p-6 rounded-lg border border-slate-200">
                              <p className="font-bold text-slate-800 mb-2">3. בדיעבד, מה היית {g('עושה', 'עושה')} אחרת? מדוע?</p>
                              <p className="text-slate-700 whitespace-pre-wrap leading-relaxed">{questionnaireAnswers.q3}</p>
                            </div>
                            <div className="bg-slate-50 p-6 rounded-lg border border-slate-200">
                              <p className="font-bold text-slate-800 mb-2">4. {g('הסבר', 'הסבירי')} במילים שלך: מדוע במדינה דמוקרטית הכרחי לשמור על שלטון החוק?</p>
                              <p className="text-slate-700 whitespace-pre-wrap leading-relaxed">{questionnaireAnswers.q4}</p>
                            </div>
                          </div>

                          <div className="mt-12 text-center text-slate-400 text-sm">
                            <p>המסמך הופק אוטומטית באמצעות מערכת לומדת "משבר בעיר המעורבת"</p>
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })()}

              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
